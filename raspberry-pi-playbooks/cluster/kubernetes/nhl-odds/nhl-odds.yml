---
# Required variables (set in group_vars or ansible-vault):
#   nhl_odds_postgres_password
#   nhl_odds_api_key
#   nhl_odds_api_backfill_key
#
# Optional backup restore:
#   Place a pg_dump file at ~/source/ansible-files/backups/nhl-odds/nhl.dump
#   on the control machine. If present, it will be restored into the database
#   after deployment.

- name: Configure NHL Odds
  hosts: control_plane
  gather_facts: false
  become: true

  vars:
    ansible_files_path: "~/source/ansible-files"
    local_backup_path: "{{ lookup('env', 'HOME') }}/source/ansible-files/backups/nhl-odds/nhl.dump"
    remote_backup_path: /tmp/nhl-odds-restore.dump

  vars_files:
    - "{{ ansible_files_path }}/vars/nhl_vars.yml"

  environment:
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    PATH: "/home/{{ ansible_user }}/go/bin:{{ ansible_env.PATH }}"

  tasks:
    - name: Install CloudNativePG operator.
      ansible.builtin.command: >
        kubectl apply --server-side -f
        https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.0.yaml

    - name: Create nhl-odds namespace.
      kubernetes.core.k8s:
        name: nhl-odds
        api_version: v1
        kind: Namespace
        state: present

    - name: Fetch NHL Odds schema SQL
      ansible.builtin.uri:
        url: https://raw.githubusercontent.com/cole-titze/nhl-odds/main/database/Scripts/CreateTables.sql
        return_content: true
      register: schema_sql
      delegate_to: localhost
      become: false

    - name: Apply nhl-odds manifests.
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'nhl-odds-template.yml') }}"
        state: present

    - name: Check if local database backup exists
      ansible.builtin.stat:
        path: "{{ local_backup_path }}"
      register: backup_file
      delegate_to: localhost
      become: false

    - name: Copy database backup to control plane
      ansible.builtin.copy:
        src: "{{ local_backup_path }}"
        dest: "{{ remote_backup_path }}"
        mode: '0644'
      when: backup_file.stat.exists

    - name: Wait for database pod to exist
      ansible.builtin.shell: |
        kubectl get pod -l cnpg.io/cluster=nhl-odds-database,role=primary -n nhl-odds --no-headers 2>/dev/null | wc -l
      register: db_pod_count
      until: db_pod_count.stdout | trim | int > 0
      retries: 30
      delay: 10
      changed_when: false
      when: backup_file.stat.exists

    - name: Wait for database pod to be ready
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod -l cnpg.io/cluster=nhl-odds-database,role=primary -n nhl-odds --timeout=300s
      changed_when: false
      when: backup_file.stat.exists

    - name: Get database pod name
      ansible.builtin.command: >
        kubectl get pod -n nhl-odds -l cnpg.io/cluster=nhl-odds-database,role=primary -o jsonpath='{.items[0].metadata.name}'
      register: db_pod_name
      changed_when: false
      when: backup_file.stat.exists

    - name: Copy backup into database pod
      ansible.builtin.command: >
        kubectl cp {{ remote_backup_path }} nhl-odds/{{ db_pod_name.stdout }}:/var/lib/postgresql/data/restore.dump
      when: backup_file.stat.exists

    - name: Restore database from backup
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} --
        pg_restore --username=postgres --dbname=nhl --clean --if-exists --verbose /var/lib/postgresql/data/restore.dump
      when: backup_file.stat.exists

    - name: Remove backup from database pod
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} -- rm /var/lib/postgresql/data/restore.dump
      changed_when: false
      when: backup_file.stat.exists

    - name: Remove backup from control plane
      ansible.builtin.file:
        path: "{{ remote_backup_path }}"
        state: absent
      when: backup_file.stat.exists
