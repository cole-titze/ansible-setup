---
# Required variables (set in group_vars or ansible-vault):
#   nhl_odds_postgres_password
#   nhl_odds_api_key
#   nhl_odds_api_backfill_key
#
# Optional backup restore:
#   Place a pg_dump file at ~/source/ansible-files/backups/nhl-odds/nhl.dump
#   on the control machine. If present, it will be restored into the database
#   after deployment.

- name: Configure NHL Odds
  hosts: control_plane
  gather_facts: false
  become: true

  vars:
    ansible_files_path: "~/source/ansible-files"
    local_backup_path: "{{ lookup('env', 'HOME') }}/source/ansible-files/backups/nhl-odds/nhl.dump"
    remote_backup_path: /tmp/nhl-odds-restore.dump

  vars_files:
    - "{{ ansible_files_path }}/vars/nhl_vars.yml"

  environment:
    K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    PATH: "/home/{{ ansible_user }}/go/bin:{{ ansible_env.PATH }}"

  tasks:
    - name: Install CloudNativePG operator.
      ansible.builtin.command: >
        kubectl apply --server-side -f
        https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.25/releases/cnpg-1.25.0.yaml
      register: cnpg_install
      changed_when: "'configured' in cnpg_install.stdout or 'created' in cnpg_install.stdout"

    - name: Create nhl-odds namespace.
      kubernetes.core.k8s:
        name: nhl-odds
        api_version: v1
        kind: Namespace
        state: present

    - name: Fetch NHL Odds schema SQL
      ansible.builtin.uri:
        url: https://raw.githubusercontent.com/cole-titze/nhl-odds/main/database/Scripts/CreateTables.sql
        return_content: true
      register: schema_sql
      delegate_to: localhost
      become: false

    - name: Apply nhl-odds manifests.
      kubernetes.core.k8s:
        definition: "{{ lookup('template', 'nhl-odds-template.yml') }}"
        state: present

    - name: Check if local database backup exists
      ansible.builtin.stat:
        path: "{{ local_backup_path }}"
      register: backup_file
      delegate_to: localhost
      become: false

    - name: Wait for database pod to exist
      ansible.builtin.shell: |
        kubectl get pod -l cnpg.io/cluster=nhl-odds-database,role=primary -n nhl-odds --no-headers 2>/dev/null | wc -l
      register: db_pod_count
      until: db_pod_count.stdout | trim | int > 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for database pod to be ready
      ansible.builtin.shell: |
        kubectl wait --for=condition=ready pod -l cnpg.io/cluster=nhl-odds-database,role=primary -n nhl-odds --timeout=300s
      changed_when: false

    - name: Get database pod name
      ansible.builtin.command: >
        kubectl get pod -n nhl-odds -l cnpg.io/cluster=nhl-odds-database,role=primary -o jsonpath='{.items[0].metadata.name}'
      register: db_pod_name
      changed_when: false

    - name: Check if database already has data
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} --
        psql -U postgres -d nhl -tAc 'SELECT COUNT(*) FROM "GameCleaned"'
      register: db_row_count
      changed_when: false
      when: backup_file.stat.exists

    - name: Copy database backup to control plane
      ansible.builtin.copy:
        src: "{{ local_backup_path }}"
        dest: "{{ remote_backup_path }}"
        mode: '0644'
      when: backup_file.stat.exists and (db_row_count.stdout | trim | int == 0)

    - name: Copy backup into database pod
      ansible.builtin.command: >
        kubectl cp {{ remote_backup_path }} nhl-odds/{{ db_pod_name.stdout }}:/var/lib/postgresql/data/restore.dump
      when: backup_file.stat.exists and (db_row_count.stdout | trim | int == 0)

    - name: Restore database from backup
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} --
        pg_restore --username=postgres --dbname=nhl --clean --if-exists --verbose /var/lib/postgresql/data/restore.dump
      when: backup_file.stat.exists and (db_row_count.stdout | trim | int == 0)

    - name: Remove backup from database pod
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} -- rm /var/lib/postgresql/data/restore.dump
      changed_when: false
      when: backup_file.stat.exists and (db_row_count.stdout | trim | int == 0)

    - name: Remove backup from control plane
      ansible.builtin.file:
        path: "{{ remote_backup_path }}"
        state: absent
      when: backup_file.stat.exists and (db_row_count.stdout | trim | int == 0)

    # Migration for clusters bootstrapped with owner=postgres: ensure nhl_app exists
    # and owns the nhl database + all public-schema objects. For fresh clusters the
    # role/ownership are already correct (CNPG bootstrap handles it via
    # Cluster.bootstrap.initdb.owner), so each step below is a no-op.
    - name: Check if nhl_app role exists
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} --
        psql -U postgres -tAc "SELECT 1 FROM pg_roles WHERE rolname='nhl_app'"
      register: nhl_app_role
      changed_when: false

    - name: Create nhl_app role
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} --
        psql -U postgres -c "CREATE ROLE nhl_app WITH LOGIN PASSWORD '{{ nhl_odds_postgres_password }}'"
      when: nhl_app_role.stdout | trim == ''

    # REASSIGN OWNED can't be used here — postgres owns system objects it refuses to
    # release. Walk public-schema objects explicitly instead; ALTER ... OWNER is a
    # no-op when already owned by nhl_app.
    - name: Transfer ownership of nhl database and public-schema objects to nhl_app
      ansible.builtin.shell: |
        kubectl exec -i -n nhl-odds {{ db_pod_name.stdout }} -- psql -U postgres -v ON_ERROR_STOP=1 -d nhl <<'PSQL'
        ALTER DATABASE nhl OWNER TO nhl_app;
        DO $$
        DECLARE r RECORD;
        BEGIN
          FOR r IN SELECT tablename FROM pg_tables WHERE schemaname = 'public' LOOP
            EXECUTE format('ALTER TABLE public.%I OWNER TO nhl_app', r.tablename);
          END LOOP;
          FOR r IN SELECT sequence_name FROM information_schema.sequences WHERE sequence_schema = 'public' LOOP
            EXECUTE format('ALTER SEQUENCE public.%I OWNER TO nhl_app', r.sequence_name);
          END LOOP;
          FOR r IN SELECT viewname FROM pg_views WHERE schemaname = 'public' LOOP
            EXECUTE format('ALTER VIEW public.%I OWNER TO nhl_app', r.viewname);
          END LOOP;
          FOR r IN SELECT matviewname FROM pg_matviews WHERE schemaname = 'public' LOOP
            EXECUTE format('ALTER MATERIALIZED VIEW public.%I OWNER TO nhl_app', r.matviewname);
          END LOOP;
        END $$;
        PSQL
      changed_when: false

    - name: Sync nhl_app password with secret
      ansible.builtin.shell: >
        kubectl exec -n nhl-odds {{ db_pod_name.stdout }} --
        psql -U postgres -c "ALTER USER nhl_app WITH PASSWORD '{{ nhl_odds_postgres_password }}'"
      changed_when: false

    - name: Restart webapi and scheduler to pick up credentials
      ansible.builtin.command: >
        kubectl rollout restart deployment -n nhl-odds nhl-odds-webapi nhl-odds-scheduler
      changed_when: false
