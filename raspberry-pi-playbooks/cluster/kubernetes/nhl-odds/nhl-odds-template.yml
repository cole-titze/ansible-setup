                - name: ODDS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: odds-api-key

---
# CronJob: Daily odds fetch — KalshiFetch (6:15am CT) — replaces scheduler/daily-odds-fetch.sh step 2
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-entry-kalshi-fetch
  namespace: nhl-odds
spec:
  schedule: "15 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
