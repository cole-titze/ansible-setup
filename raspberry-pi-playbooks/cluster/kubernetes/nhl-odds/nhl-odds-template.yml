---
apiVersion: v1
kind: Secret
metadata:
  name: nhl-odds-secret
  namespace: nhl-odds
type: Opaque
stringData:
  postgres-password: "{{ nhl_odds_postgres_password }}"
  odds-api-key: "{{ nhl_odds_api_key }}"
  api-backfill-key: "{{ nhl_odds_api_backfill_key }}"
  cloudflare-tunnel-token: "{{ nhl_odds_cloudflare_tunnel_token }}"

---
# Secret for CloudNativePG superuser — CNPG requires 'username' + 'password' keys
apiVersion: v1
kind: Secret
metadata:
  name: nhl-odds-superuser
  namespace: nhl-odds
type: kubernetes.io/basic-auth
stringData:
  username: postgres
  password: "{{ nhl_odds_postgres_password }}"

---
# Schema ConfigMap — SQL fetched from nhl-odds repo at deploy time
apiVersion: v1
kind: ConfigMap
metadata:
  name: nhl-odds-schema
  namespace: nhl-odds
data:
  create-tables.sql: |
    {{ schema_sql.content | indent(4) }}

---
# CloudNativePG Cluster — replaces plain Deployment + PVC
# CNPG automatically creates services: nhl-odds-database-rw (primary), nhl-odds-database-r (any), nhl-odds-database-ro (replicas)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: nhl-odds-database
  namespace: nhl-odds
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17
  enableSuperuserAccess: true
  superuserSecret:
    name: nhl-odds-superuser
  bootstrap:
    initdb:
      database: nhl
      owner: postgres
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: nhl-odds-schema
            key: create-tables.sql
  storage:
    size: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nhl-odds-webapi
  namespace: nhl-odds
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nhl-odds-webapi
  template:
    metadata:
      labels:
        app: nhl-odds-webapi
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nhl-odds-webapi
                topologyKey: kubernetes.io/hostname
      containers:
        - name: webapi
          image: ghcr.io/cole-titze/nhl-odds/webapi:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: TZ
              value: America/Chicago
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nhl-odds-secret
                  key: postgres-password
            - name: NHL_DATABASE
              value: "Host=nhl-odds-database-rw;Database=nhl;Username=postgres;Password=$(POSTGRES_PASSWORD)"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: nhl-odds-webapi
  namespace: nhl-odds
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: nhl-odds-webapi

---
# The frontend image has a Docker-specific DNS resolver (127.0.0.11) baked into
# its nginx.conf. This ConfigMap overrides it to work in Kubernetes.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nhl-odds-nginx-config
  namespace: nhl-odds
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://nhl-odds-webapi:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /mcp {
            proxy_pass http://nhl-odds-webapi:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nhl-odds-frontend
  namespace: nhl-odds
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nhl-odds-frontend
  template:
    metadata:
      labels:
        app: nhl-odds-frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: nhl-odds-frontend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: frontend
          image: ghcr.io/cole-titze/nhl-odds/frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: nhl-odds-nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: nhl-odds-frontend
  namespace: nhl-odds
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app: nhl-odds-frontend

---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nhl-odds
  namespace: nhl-odds
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nhl-odds.kubecluster`)
      kind: Rule
      services:
        - name: nhl-odds-frontend
          port: 80
  tls:
    secretName: local-cert

---
# CronJob: Daily NHL data collection (3am CT) — replaces scheduler/daily-data-collection.sh
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-entry-nhl-add
  namespace: nhl-odds
spec:
  schedule: "0 3 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: entry
              image: ghcr.io/cole-titze/nhl-odds/entry:latest
              imagePullPolicy: Always
              env:
                - name: TZ
                  value: America/Chicago
                - name: RUN_MODE
                  value: NhlAdd
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: postgres-password
                - name: NHL_DATABASE
                  value: "Host=nhl-odds-database-rw;Database=nhl;Username=postgres;Password=$(POSTGRES_PASSWORD)"

---
# CronJob: Daily odds fetch — NextDayOdds (6am CT) — replaces scheduler/daily-odds-fetch.sh step 1
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-entry-next-day-odds
  namespace: nhl-odds
spec:
  schedule: "0 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: entry
              image: ghcr.io/cole-titze/nhl-odds/entry:latest
              imagePullPolicy: Always
              env:
                - name: TZ
                  value: America/Chicago
                - name: RUN_MODE
                  value: NextDayOdds
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: postgres-password
                - name: NHL_DATABASE
                  value: "Host=nhl-odds-database-rw;Database=nhl;Username=postgres;Password=$(POSTGRES_PASSWORD)"
                - name: ODDS_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: odds-api-key

---
# CronJob: Daily odds fetch — KalshiFetch (6:15am CT) — replaces scheduler/daily-odds-fetch.sh step 2
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-entry-kalshi-fetch
  namespace: nhl-odds
spec:
  schedule: "15 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: entry
              image: ghcr.io/cole-titze/nhl-odds/entry:latest
              imagePullPolicy: Always
              env:
                - name: TZ
                  value: America/Chicago
                - name: RUN_MODE
                  value: KalshiFetch
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: postgres-password
                - name: NHL_DATABASE
                  value: "Host=nhl-odds-database-rw;Database=nhl;Username=postgres;Password=$(POSTGRES_PASSWORD)"

---
# CronJob: Daily prediction (6:30am CT) — replaces scheduler/daily-odds-fetch.sh step 3
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-predictor
  namespace: nhl-odds
spec:
  schedule: "30 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: predictor
              image: ghcr.io/cole-titze/nhl-odds/predictor:latest
              imagePullPolicy: Always
              env:
                - name: TZ
                  value: America/Chicago
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: postgres-password
                - name: NHL_DATABASE
                  value: "Host=nhl-odds-database-rw;Database=nhl;Username=postgres;Password=$(POSTGRES_PASSWORD)"

{% for host in groups['control_plane'] %}
---
# CronJob: Nightly database backup (1am CT) with 7-day retention — {{ host }}
# Dumps land at /home/pi/backups/nhl-odds/ on each node for SFTP retrieval
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-db-backup-{{ host }}
  namespace: nhl-odds
spec:
  schedule: "0 1 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: {{ host }}
          containers:
            - name: backup
              image: postgres:17
              env:
                - name: TZ
                  value: America/Chicago
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: postgres-password
              command: ["/bin/sh", "-c"]
              args:
                - |
                  set -e
                  mkdir -p /backups
                  BACKUP_FILE="/backups/nhl-$(date +%Y-%m-%d).dump"
                  pg_dump -h nhl-odds-database-rw -U postgres -Fc nhl > "$BACKUP_FILE"
                  echo "Backup saved to $BACKUP_FILE"
                  find /backups -name "nhl-*.dump" -mtime +7 -delete
                  echo "Old backups pruned"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              hostPath:
                path: /home/pi/backups/nhl-odds
                type: DirectoryOrCreate
{% endfor %}

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: nhl-odds
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: cloudflared
                topologyKey: kubernetes.io/hostname
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: nhl-odds-secret
                  key: cloudflare-tunnel-token
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"

---
# ServiceAccount + RBAC for the scheduler to create/delete Jobs
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nhl-odds-scheduler
  namespace: nhl-odds
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nhl-odds-scheduler
  namespace: nhl-odds
rules:
  - apiGroups: [batch]
    resources: [jobs]
    verbs: [get, list, create, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nhl-odds-scheduler
  namespace: nhl-odds
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nhl-odds-scheduler
subjects:
  - kind: ServiceAccount
    name: nhl-odds-scheduler
    namespace: nhl-odds
---
# Scheduler: polls DB every minute for requested jobs and creates Kubernetes Jobs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nhl-odds-scheduler
  namespace: nhl-odds
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nhl-odds-scheduler
  template:
    metadata:
      labels:
        app: nhl-odds-scheduler
    spec:
      serviceAccountName: nhl-odds-scheduler
      containers:
        - name: scheduler
          image: ghcr.io/cole-titze/nhl-odds/scheduler-k8s:latest
          imagePullPolicy: Always
          env:
            - name: TZ
              value: America/Chicago
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nhl-odds-secret
                  key: postgres-password
            - name: NHL_DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@nhl-odds-database-rw:5432/nhl"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
