---
# CronJob: Daily prediction (6:30am CT) — replaces scheduler/daily-odds-fetch.sh step 3
apiVersion: batch/v1
kind: CronJob
metadata:
  name: nhl-odds-predictor
  namespace: nhl-odds
spec:
  schedule: "30 6 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: predictor
              image: ghcr.io/cole-titze/nhl-odds/predictor:latest
              imagePullPolicy: Always
              env:
                - name: TZ
                  value: America/Chicago
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: nhl-odds-secret
                      key: postgres-password
                - name: NHL_DATABASE
                  value: "Host=nhl-odds-database;Database=nhl;Username=postgres;Password=$(POSTGRES_PASSWORD)"
