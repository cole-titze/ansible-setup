---
- name: Backup NHL Odds database
  hosts: control_plane
  gather_facts: false

  vars:
    local_backup_dir: "{{ lookup('env', 'HOME') }}/source/ansible-files/backups/nhl-odds/"
    remote_backup_dir: /home/pi/backups/nhl-odds/

  tasks:
    - name: Ensure local backup directory exists
      ansible.builtin.file:
        path: "{{ local_backup_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: true

    - name: Get list of backup files on node
      ansible.builtin.find:
        paths: "{{ remote_backup_dir }}"
        patterns: "nhl-*.dump"
        file_type: file
      register: backup_files

    - name: Fetch backup files to local machine
      ansible.builtin.fetch:
        src: "{{ item.path }}"
        dest: "{{ local_backup_dir }}"
        flat: true
      loop: "{{ backup_files.files }}"
